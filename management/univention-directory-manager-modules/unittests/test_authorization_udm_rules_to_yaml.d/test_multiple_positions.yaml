capabilities:
  udm:con/dc:
    role:
      conditions:
        AND:
        - object-type-is-con-dc
        - position-d42fd735
      displayname: ''
      grants-permissions:
      - con-dc-role-all
    role-1:
      conditions:
        AND:
        - object-type-is-con-dc
        - position-cc818ccc
      displayname: ''
      grants-permissions:
      - con-dc-role-1-all
  udm:container/dc:
    role:
      conditions:
        AND:
        - object-type-is-container-dc
        - position-1431802d
      displayname: ''
      grants-permissions:
      - container-dc-role-all
capability-bundles:
  udm:default-roles:
    role:
    - udm:container/dc:role
    - udm:con/dc:role
    - udm:con/dc:role-1
conditions:
  object-type-is-con-dc:
    udm:conditions:target_object_type_equals:
      objectType: con/dc
  object-type-is-container-dc:
    udm:conditions:target_object_type_equals:
      objectType: container/dc
  position-1431802d:
    udm:conditions:target_position_in:
      position: ldap_base
      scope: base
  position-cc818ccc:
    udm:conditions:target_position_in:
      position: ou=bla,ldap_base
      scope: subtree
  position-d42fd735:
    udm:conditions:target_position_in:
      position: cn=bla,ldap_base
      scope: one
permission-sets:
  con-dc-role-1-all:
  - udm:con/dc:read
  - udm:con/dc:read-property-*
  - udm:con/dc:search
  - udm:con/dc:search-property-*
  con-dc-role-all:
  - udm:con/dc:read
  - udm:con/dc:read-property-*
  - udm:con/dc:search
  - udm:con/dc:search-property-*
  container-dc-role-all:
  - udm:container/dc:read
  - udm:container/dc:read-property-*
  - udm:container/dc:search
  - udm:container/dc:search-property-*
role-capability-mapping:
  udm:default-roles:
    role:
      capabilities: []
      capability-bundles:
      - udm:default-roles:role
      displayname: ''
      permissions: []
