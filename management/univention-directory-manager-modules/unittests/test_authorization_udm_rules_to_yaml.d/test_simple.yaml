capabilities:
  udm:container/dc:
    role:
      conditions:
        AND:
        - object-type-is-container-dc
        - position-1431802d
      displayname: ''
      grants-permissions:
      - container-dc-role-all
capability-bundles:
  udm:default-roles:
    role:
    - udm:container/dc:role
conditions:
  object-type-is-container-dc:
    udm:conditions:target_object_type_equals:
      objectType: container/dc
  position-1431802d:
    udm:conditions:target_position_in:
      position: ldap_base
      scope: base
permission-sets:
  container-dc-role-all:
  - udm:container/dc:read
  - udm:container/dc:read-property-*
  - udm:container/dc:search
  - udm:container/dc:search-property-*
role-capability-mapping:
  udm:default-roles:
    role:
      capabilities: []
      capability-bundles:
      - udm:default-roles:role
      displayname: ''
      permissions: []
