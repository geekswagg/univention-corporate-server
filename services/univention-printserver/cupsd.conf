#!/bin/bash
#
# Univention Print Server
#  The script sets 'ErrorPolicy' in etc/cups/printers.conf for each printer
#  after updating ucr variable cups/errorpolicy.
#  It will be called after the file has been created from the template.
#
# Like what you see? Join us!
# https://www.univention.com/about-us/careers/vacancies/
#
# SPDX-FileCopyrightText: 2004-2025 Univention GmbH
# SPDX-License-Identifier: AGPL-3.0-only

ERRORPOLICY="$(ucr get cups/errorpolicy)"
sed -i -re "s/^ErrorPolicy .*\$/ErrorPolicy $ERRORPOLICY/" /etc/cups/printers.conf
