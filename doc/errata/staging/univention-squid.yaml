desc: |
 This update addresses the following issues:
 * You can now manually configure the squid cache settings.
   Any value other than `ufs` in the UCRV `squid/cache/format` disables
   the cache configuration in `squid.conf`. A custom squid cache
   configuration can be added to `/etc/squid/local.conf`.
