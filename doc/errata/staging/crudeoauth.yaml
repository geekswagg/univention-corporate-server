src: crudeoauth
fix: 1.0.0-3
desc: |
 This update addresses the following issues:
 * A configuration option to disable checks for TLS encrypted connections has
   been added to support using the SASL mechanism OAUTHBEARER in Kubernetes
   environments.
 * A segmentation fault is prevented if the JWKS file for the OpenID provider
   is larger than 8192 bytes.
bug: [58210, 57508]
