desc: |
 This update addresses the following issues:
 * Certain widgets, e.g., in the `Users Module`, were not considered as empty
   by the frontend although they were. This led to values being sent to
   backend that should have been ignored. This has been fixed.
 * Improved the styling of the MultiInput widget when displaying more than
   two input fields to enhance UI appearance in the UMC.
bug: [58130, 58122]
