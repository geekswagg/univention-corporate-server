fix: 9.2.1
desc: |
 This update addresses the following issue:
 * In some situations, `univention-radius-ntlm-auth` did not correctly report
   errors to the `RADIUS` server and also did not log them. The program has
   been improved and is now able to intercept these errors and log
   them in `/var/log/univention/radius_ntlm_auth.log` (Bug #58132).
 * The permissions for the log file `/var/log/univention/radius_ntlm_auth.log`
   were not set correctly by logrotate, which caused
   `univention-radius-ntlm-auth` to crash. This update automatically corrects
   the file permissions and the configuration of logrotate (Bug #58132).
bug: [58132]
