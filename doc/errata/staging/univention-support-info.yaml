desc: |
 This update addresses the following issues:
 * A new script was added: `univention-export-anonymized-ldap` creates an
   offline copy of the LDAP server. It will then anonymize the data with
   regards to user data like names, mail addresses, passwords, ... Use case is
   a file that could be used in test environments to analyze e.g. performance.
