desc: |
 This update addresses the following issues:
 * The “route” tool from the package is used on some UCS systems for the
   configuration of additional routes via UCR variables. Due to a change
   in the package dependencies with UCS 5.2-0, the “net-tools” package was
   no longer installed automatically, which meant that these additional
   routes were no longer set automatically when configuring the network
   interfaces. The package dependencies have been adjusted accordingly so
   that this package is now automatically installed again.
