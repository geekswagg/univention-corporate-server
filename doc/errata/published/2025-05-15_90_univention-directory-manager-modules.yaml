src: univention-directory-manager-modules
fix: 17.0.36
desc: |
 This update addresses the following issues:
 * UDM hook extension modules could overwrite members of the global
   python namespace, possibly leading to trivial conflicts between
   imported modules.
   The import of these modules has been adjusted to sandbox
   their global namespace and selectiveley import only the
   intended subclass types.
 * The univentionObjectIdentifier UDM property has been added to all UDM
   modules. To set an autogenerated value if none was specified in the create
   request, set the new UCR variable:
   `directory/manager/object-identifier/autogeneration=true`
bug: [58252, 57630]
