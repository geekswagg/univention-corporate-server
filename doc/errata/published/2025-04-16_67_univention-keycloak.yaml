desc: |
 This update addresses the following issues:
 * The options `startTls` and `connectionPooling` are incompatible in
   Keycloak 26. As of this version, `connectionPooling` will only be enabled
   if `startTls` is disabled. This is due to underlying limitations with
   pooling secure (TLS) connections.
