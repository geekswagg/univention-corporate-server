desc: |
 This update addresses the following issues:
 * When checking for password expiry the OpenLDAP overlay module `shdowbind`
   looks at the LDAP attribute `shadowMax`, which is stored at the accounts.
   It treated a value of 0 specially as "no expiry check needed".
   We improved input value validation for that, because a value of 0 was
   consided invalid before.
   This update changes that and it treats it just as a normal value.
   This change became necessary to make the handling of password expiry
   more consistent on the day of expiry between `pam_unix`, OpenLDAP
   and Kerberos.
